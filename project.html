  <div class="page">

    <header class="navWrap reveal" data-delay="1">
      <nav class="navPill" aria-label="Primary">
        <button class="langBtn" id="langToggle" type="button">AR</button>

        <div class="logoBubble" aria-label="Logo">
          <img
            class="footerLogoImg"
            src="assets/Logo.png"
            alt="Logo"
            width="48"
            height="48"
            decoding="async"
          />
        </div>

        <div class="navLinks" role="navigation">
          <a class="navLink" href="index.html#home" data-i18n="nav.home"></a>
          <a class="navLink" href="index.html#about" data-i18n="nav.about"></a>
          <a class="navLink" href="index.html#projects" data-i18n="nav.projects"></a>
        </div>
      </nav>
    </header>

    <main class="projectPage">
  <section class="projectPageLayout reveal" data-delay="1">

    <div class="projectPageGallery">
      <div class="projectGalleryCard">
        <button class="projectGalleryBtn prev" id="prevBtn" type="button" data-i18n-attr="aria-label:project.prev">‹</button>

        <div class="projectGalleryViewport">
          <img id="galleryImage" class="projectGalleryImage" src="" alt="">
        </div>

        <button class="projectGalleryBtn next" id="nextBtn" type="button" data-i18n-attr="aria-label:project.next">›</button>
      </div>

      <div class="projectGalleryDots" id="galleryDots"></div>
    </div>

    <div class="projectPageInfo">
      <a class="projectBackBtn" href="index.html#projects" data-i18n="project.back"></a>
      <p class="projectPageEyebrow" data-i18n="project.label"></p>
      <h1 class="projectPageTitle" id="projectTitle"></h1>
      <p class="projectPageDesc" id="projectDesc"></p>
      <a class="cta cvBtn" id="figmaBtn" data-i18n="figmaBtn"></a>
    </div>

  </section>
</main>
